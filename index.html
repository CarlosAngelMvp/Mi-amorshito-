<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Tyra 💗</title>

<style>

body{
margin:0;
background:#F5E8DC;
overflow:hidden;
font-family:Arial;
}

canvas{
position:absolute;
top:0;
left:0;
}

.text{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:28px;
color:#5C4033;
}

</style>
</head>

<body>

<canvas id="tree"></canvas>

<div class="text">
Tyra... mi amor por ti crece cada día 💗
</div>

<script>

const canvas = document.getElementById("tree");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let branches = [];
let hearts = [];

class Branch{
constructor(x,y,len,angle,width){
this.x=x
this.y=y
this.len=len
this.angle=angle
this.width=width
}

draw(){

ctx.beginPath()

let x2 = this.x + Math.cos(this.angle)*this.len
let y2 = this.y + Math.sin(this.angle)*this.len

ctx.moveTo(this.x,this.y)
ctx.lineTo(x2,y2)

ctx.strokeStyle="#2e8b57"
ctx.lineWidth=this.width
ctx.stroke()

if(this.len>10){

branches.push(new Branch(
x2,
y2,
this.len*0.7,
this.angle + (Math.random()*0.6-0.3),
this.width*0.7
))

branches.push(new Branch(
x2,
y2,
this.len*0.7,
this.angle - (Math.random()*0.6-0.3),
this.width*0.7
))

}else{

for(let i=0;i<3;i++){
hearts.push(new Heart(x2,y2))
}

}

}

}

class Heart{

constructor(x,y){
this.x=x
this.y=y
this.size=Math.random()*8+4
this.speed=Math.random()*1+0.5
this.color=`hsl(${Math.random()*360},70%,60%)`
}

draw(){

ctx.fillStyle=this.color

ctx.beginPath()

ctx.moveTo(this.x,this.y)

ctx.bezierCurveTo(
this.x,this.y-this.size,
this.x-this.size,this.y-this.size,
this.x-this.size,this.y
)

ctx.bezierCurveTo(
this.x-this.size,this.y+this.size,
this.x,this.y+this.size,
this.x,this.y+this.size*2
)

ctx.bezierCurveTo(
this.x,this.y+this.size,
this.x+this.size,this.y+this.size,
this.x+this.size,this.y
)

ctx.bezierCurveTo(
this.x+this.size,this.y-this.size,
this.x,this.y-this.size,
this.x,this.y
)

ctx.fill()

this.y+=this.speed

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

branches.forEach(b=>b.draw())

hearts.forEach(h=>h.draw())

requestAnimationFrame(animate)

}

branches.push(
new Branch(
canvas.width/2,
canvas.height,
120,
-Math.PI/2,
12
))

animate()

</script>

</body>
</html>
