<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Tyra 💖</title>

<style>

body{
margin:0;
background:#f7f2ea;
font-family:Arial;
overflow:hidden;
text-align:left;
}

/* Texto */

.text{
position:absolute;
left:60px;
top:120px;
width:350px;
color:#444;
font-size:20px;
opacity:0;
animation:showText 3s forwards;
animation-delay:6s;
}

/* Árbol */

.tree{
position:absolute;
bottom:0;
right:200px;
width:200px;
height:300px;
}

/* Tallo */

.stem{
position:absolute;
bottom:0;
left:95px;
width:10px;
height:0;
background:#0f7a60;
animation:growStem 3s forwards;
}

/* Corazón */

.heart{
position:absolute;
top:40px;
left:0;
right:0;
margin:auto;
width:200px;
height:200px;
opacity:0;
animation:showHeart 3s forwards;
animation-delay:3s;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:100px;
height:160px;
background:#ff6aa2;
border-radius:100px 100px 0 0;
}

.heart:before{
left:100px;
transform:rotate(-45deg);
transform-origin:0 100%;
}

.heart:after{
left:0;
transform:rotate(45deg);
transform-origin:100% 100%;
}

/* Pétalos */

.petal{
position:absolute;
width:12px;
height:12px;
background:pink;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(800px);}
}

/* Animaciones */

@keyframes growStem{
0%{height:0;}
100%{height:180px;}
}

@keyframes showHeart{
0%{opacity:0; transform:scale(0);}
100%{opacity:1; transform:scale(1);}
}

@keyframes showText{
0%{opacity:0;}
100%{opacity:1;}
}

#timer{
position:absolute;
bottom:30px;
left:60px;
font-size:24px;
color:#333;
}

</style>
</head>

<body>

<div class="text">

<b>Para el amor de mi vida:</b><br><br>

Si pudiera elegir un lugar seguro, sería a tu lado.<br>
Cuanto más tiempo estoy contigo más te amo.<br><br>

Hoy quiero preguntarte algo muy importante…<br><br>

<b>¿Quieres ser mi novia oficialmente? 💖</b>

</div>

<div class="tree">

<div class="stem"></div>

<div class="heart"></div>

</div>

<div id="timer"></div>

<script>

/* pétalos */

for(let i=0;i<40;i++){

let petal=document.createElement("div")
petal.className="petal"

petal.style.left=Math.random()*window.innerWidth+"px"
petal.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(petal)

}

/* contador */

let startDate = new Date("2024-01-01")

function updateTimer(){

let now = new Date()

let diff = now - startDate

let days = Math.floor(diff/(1000*60*60*24))
let hours = Math.floor(diff/(1000*60*60))%24
let minutes = Math.floor(diff/(1000*60))%60
let seconds = Math.floor(diff/1000)%60

document.getElementById("timer").innerHTML =
"Mi amor por ti comenzó hace...<br>"+
days+" días "+
hours+" horas "+
minutes+" minutos "+
seconds+" segundos"

}

setInterval(updateTimer,1000)

</script>

</body>
  </html>
