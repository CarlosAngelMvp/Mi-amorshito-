<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para el amor de mi vida</title>
    <style>
        body { background-color: #ffeef2; margin: 0; font-family: sans-serif; color: #664d4d; }
        #content { width: 900px; margin: 50px auto; position: relative; }
        #code { float: left; width: 440px; padding-top: 50px; font-size: 18px; line-height: 1.6; }
        #garden { float: right; width: 460px; height: 500px; }
        #elapseClock { font-size: 24px; margin-top: 20px; font-weight: bold; }
        .digit { color: #f36; }
    </style>
</head>
<body>
    <div id="content">
        <div id="code">
            Para el amor de mi vida:<br/><br/>
            Si pudiera elegir un lugar seguro, sería a tu lado.<br/>
            Cuanto más tiempo estoy contigo más te amo.<br/>
            <strong>Mi amor por ti comenzó hace...</strong>
            <div id="elapseClock"></div>
        </div>
        <canvas id="garden"></canvas>
    </div>

    <!-- Aquí iría el script que dibuja el árbol y el contador -->
    <script>
        // Configura aquí TU FECHA de aniversario: (Año, Mes-1, Día, Hora, Minuto)
        var together = new Date();
        together.setFullYear(2023, 2, 14); // Ejemplo: 14 de Marzo 2023
        together.setHours(20);
        together.setMinutes(0);
        together.setSeconds(0);

        setInterval(function () {
            timeElapse(together);
        }, 1000);

        function timeElapse(date) {
            var current = Date();
            var seconds = (Date.parse(current) - Date.parse(date)) / 1000;
            var days = Math.floor(seconds / (3600 * 24));
            seconds = seconds % (3600 * 24);
            var hours = Math.floor(seconds / 3600);
            seconds = seconds % 3600;
            var minutes = Math.floor(seconds / 60);
            seconds = seconds % 60;
            
            var result = `<span class="digit">${days}</span> días <span class="digit">${hours}</span> horas <span class="digit">${minutes}</span> minutos <span class="digit">${seconds}</span> segundos`; 
            document.getElementById("elapseClock").innerHTML = result;
        }
    </script>
</body>
</html>
